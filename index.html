<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    /* Global reset & background */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #2f80ed, #56ccf2);
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #1d2f5d;
    }

    .login-card {
      width: min(400px, 90vw);
      background: #ffffffee;
      border-radius: 18px;
      box-shadow: 0 22px 40px rgba(28, 55, 122, 0.2);
      padding: 30px 28px 26px;
      border: 1px solid rgba(95, 133, 220, 0.25);
    }

    .login-card h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #1f3c88;
      letter-spacing: 0.03em;
      font-size: 1.95rem;
    }

    .login-card p.subline {
      text-align: center;
      color: #6176b7;
      margin-bottom: 26px;
      font-size: 0.95rem;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 0.88rem;
      margin-bottom: 7px;
      color: #3e538f;
    }

    .input-group input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #b7caee;
      border-radius: 11px;
      font-size: 1rem;
      color: #1a2f66;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: #fcfeff;
    }

    .input-group input:focus {
      outline: none;
      border-color: #2f80ed;
      box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.17);
      background: #fff;
    }

    .option-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 0.88rem;
      color: #4e629f;
    }

    .option-row input {
      margin-right: 6px;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 11px;
      background: linear-gradient(135deg, #2f80ed, #56ccf2);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(44, 127, 239, 0.35);
    }

    .btn-login:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .login-footer {
      margin-top: 17px;
      font-size: 0.87rem;
      text-align: center;
      color: #6176b7;
    }

    .login-footer a {
      color: #2f80ed;
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <main class="login-card" role="main">
    <h2>Welcome Back</h2>
    <p class="subline">Sign in to your account to continue</p>

    <form action="#" method="post" autocomplete="on">
      <div class="input-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" required minlength="6" />
      </div>

      <div class="option-row">
        <label>
          <input type="checkbox" name="remember" value="1" />
          Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login">Log In</button>
    </form>

    <p class="login-footer">
      New here?
      <a href="#">Create an account</a>
    </p>
  </main>

</body>
</html>
